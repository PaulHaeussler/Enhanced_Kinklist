## Enhanced Kinklist - SWAG reverse proxy
## Copy this file to:
##   /config/nginx/proxy-confs/enhanced-kinklist.subdomain.conf
##
## Replace the server_name values with your real secondary domain.
## The app container must be on the same user-defined Docker network as SWAG.

server {
    listen 443 ssl;
    # listen 443 quic;
    listen [::]:443 ssl;
    # listen [::]:443 quic;

    server_name kinkli.st www.kinkli.st;

    include /config/nginx/ssl.conf;

    client_max_body_size 2m;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;

        set $upstream_app enhanced-kinklist;
        set $upstream_port 8000;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
