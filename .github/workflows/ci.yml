name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compile Python sources
        run: python -m py_compile enhanced_kinklist.py db.py compile_stats.py wsgi.py

      - name: Check JavaScript syntax
        run: |
          node --check static/build_list.js
          node --check static/mobile.js
          node --check static/buildCharts.js

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull --tag enhanced-kinklist:test .
